name = "cf-mcp"
main = "src/index.ts"
compatibility_date = "2024-03-27"

[ai]
binding = "AI"

[[services]]
binding = "TELEMETRY_SERVICE"
service = "cf-telemetry"

[[services]]
binding = "STORAGE_SERVICE"
service = "cf-mcp-storage"
[vars]
# ==========================================
# Triple-Facet Triple Architecture Variables
# ==========================================
# Facet A: Standalone User
GEMINI_API_KEY = "" # Provide API key to bypass CR Vertex routing
DISABLE_PROXY_ENCRYPTION = "false" # Set to "true" if hosting on your own Cloudflare account

# Facet B/C: Managed CR Proxy
GOOGLE_APPLICATION_CREDENTIALS = "" # Vertex AI service account JSON
VERTEX_PROJECT_ID = ""
VERTEX_REGION = "us-central1"

# ==========================================
# Phase 5: Staging Sealed Brain (Mock TEE)
# ==========================================
ACTIVE_TENANTS = '["default_tenant"]'

[[kv_namespaces]]
binding = "TENANT_VAULT"
id = "local-dev-id"

[[durable_objects.bindings]]
name = "MCP_DO"
class_name = "McpDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["McpDurableObject"]

[triggers]
crons = ["*/15 * * * *"] # Fires every 15 minutes during Staging/QA
